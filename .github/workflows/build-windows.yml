name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0)'
        required: true
        default: '1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --windowed `
            --name "轻想纪念版" `
            --icon "AppIcon.ico" `
            --noconfirm `
            main.py

      - name: Package as ZIP
        run: |
          Compress-Archive -Path "dist\轻想纪念版" -DestinationPath "lianzai_reader_${{ github.event.inputs.version }}_windows.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: lianzai_reader_${{ github.event.inputs.version }}_windows.zip
          fail_on_unmatched_files: true
