name: Build macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0)'
        required: true
        default: '1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller Pillow

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --windowed \
            --name "轻想纪念版" \
            --icon "AppIcon.png" \
            --noconfirm \
            main.py

      - name: Create DMG
        run: |
          create-dmg \
            --volname "轻想纪念版" \
            --window-size 540 360 \
            --icon-size 100 \
            --icon "轻想纪念版.app" 180 170 \
            --app-drop-link 360 170 \
            --hide-extension "轻想纪念版.app" \
            "lianzai_reader_${{ github.event.inputs.version }}_macos.dmg" \
            "dist/轻想纪念版.app"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: lianzai_reader_${{ github.event.inputs.version }}_macos.dmg
          fail_on_unmatched_files: true
